<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禪修班雲端管理系統</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .card { background: var(--card); max-width: 500px; margin: 10px auto; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 1.5rem; }
        .status-bar { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 15px; height: 18px; }
        .control-group { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; font-size: 16px; outline: none; }
        
        /* 點名條目直式彈性排版，適合放按鈕 */
        .member-item { display: flex; flex-direction: column; padding: 15px 10px; border-bottom: 1px solid #f1f5f9; }
        .member-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .member-name { font-size: 17px; font-weight: 600; color: #334155; }
        .member-dharma { color: var(--primary) !important; font-size: 15px; margin-left: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; background: #e0e7ff; color: #4338ca; font-size: 11px; }
        
        /* 直覺式按鈕群組樣式 */
        .btn-group { display: flex; gap: 8px; width: 100%; }
        .status-btn { 
            flex: 1; 
            padding: 10px 5px; 
            font-size: 14px; 
            font-weight: 500; 
            border: 1px solid #cbd5e1; 
            background: white; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        /* 根據不同狀態亮起不同的顏色（可依您的習慣修改關鍵字） */
        .status-btn.active[data-val="參加"] { background: #dcfce7; color: #15803d; border-color: #86efac; font-weight: 600; }
        .status-btn.active[data-val="不參加"] { background: #fee2e2; color: #b91c1c; border-color: #fca5a5; font-weight: 600; }
        .status-btn.active[data-val="請假"] { background: #fef3c7; color: #b45309; border-color: #fde68a; font-weight: 600; }
        /* 通用選中樣式（如果沒對中上面的關鍵字，預設亮藍色） */
        .status-btn.active { background: #e0e7ff; color: #4338ca; border-color: #a5b4fc; font-weight: 600; }
        
        /* 點擊同步中的動態特效 */
        .status-btn.syncing { background: #fef3c7 !important; border-color: #fbbf24 !important; color: #d97706 !important; }

        .loading-overlay { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="activityTitle">活動點名載入中...</h2>
    <div id="statusMsg" class="status-bar">正在連線至雲端資料庫...</div>

    <div class="control-group">
        <label>選擇目前活動：</label>
        <select id="eventSelect" onchange="render()"></select>

        <label>篩選組別：</label>
        <select id="groupSelect" onchange="render()">
            <option value="全部">全部顯示</option>
            <option value="第一組">第一組</option>
            <option value="第二組">第二組</option>
            <option value="第三組">第三組</option>
            <option value="第四組">第四組</option>
            <option value="第五組">第五組</option>
            <option value="第六組">第六組</option>
            <option value="第七組">第七組</option>
            <option value="第八組">第八組</option>
            <option value="第九組">第九組</option>
            <option value="第十組">第十組</option>
        </select>
    </div>

    <div id="loading" class="loading-overlay">讀取名單中，請稍候...</div>
    <div id="memberContainer" class="member-list"></div>
</div>

<script>
    // --- 已為您保留目前的 Google Apps Script 網址 ---
    const API_URL = "https://script.google.com/macros/s/AKfycbxrrCkL3c7SnVn7LDqmN9yUH4SvjWcdbPW-rkjbem_gRfYRiSIMunP8uwudm_fkAnN5/exec";
    // -------------------------------------------------------

    let rawData = [];
    let eventConfigs = [];

    async function init() {
        try {
            const res = await fetch(API_URL);
            const json = await res.json();
            rawData = json.members;
            eventConfigs = json.events;

            const evSel = document.getElementById('eventSelect');
            evSel.innerHTML = '';
            eventConfigs.forEach(ev => {
                let opt = document.createElement('option');
                opt.value = ev.name; opt.innerText = ev.name;
                evSel.appendChild(opt);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('statusMsg').innerText = "✅ 同步成功";
            render();
        } catch (e) {
            document.getElementById('statusMsg').innerText = "❌ 連線失敗";
        }
    }

    function render() {
        const container = document.getElementById('memberContainer');
        const currentEvent = document.getElementById('eventSelect').value;
        const currentGroup = document.getElementById('groupSelect').value;
        const config = eventConfigs.find(e => e.name === currentEvent);
        const headers = rawData[0];
        const eventColIndex = headers.indexOf(currentEvent);
        
        document.getElementById('activityTitle').innerText = currentEvent;
        container.innerHTML = '';

        for(let i = 1; i < rawData.length; i++) {
            const row = rawData[i];
            const group = row[0];
            const name = row[1];
            const dharmaName = row[2];
            const currentStatus = row[eventColIndex] || '';

            if (currentGroup === "全部" || group === currentGroup) {
                const div = document.createElement('div');
                div.className = 'member-item';

                // 生成並排按鈕
                let buttonsHTML = config.options.map(opt => {
                    const isActive = (currentStatus.trim() === opt.trim()) ? 'active' : '';
                    return `<button class="status-btn ${isActive}" data-val="${opt}" onclick="update('${name}', '${currentEvent}', '${opt}', this)">${opt}</button>`;
                }).join('');

                div.innerHTML = `
                    <div class="member-header">
                        <div>
                            <span class="member-name">${name}</span>
                            <span class="member-dharma">(${dharmaName || '無法名'})</span>
                        </div>
                        <div class="badge">${group}</div>
                    </div>
                    <div class="btn-group">
                        ${buttonsHTML}
                    </div>
                `;
                container.appendChild(div);
            }
        }
    }

    async function update(name, eventName, newVal, clickedBtn) {
        // 如果點擊的是已經選中的狀態，就不重複送出資料
        if (clickedBtn.classList.contains('active')) return;

        // 找到同一個按鈕群組，先移除其他按鈕的選取狀態，並讓當前按鈕呈現同步中
        const btnGroup = clickedBtn.parentElement;
        const allBtns = btnGroup.querySelectorAll('.status-btn');
        allBtns.forEach(btn => btn.classList.remove('active'));
        
        clickedBtn.classList.add('syncing');
        document.getElementById('statusMsg').innerText = `正在同步 ${name} 👉 ${newVal}...`;

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name, event: eventName, status: newVal })
            });
            
            setTimeout(() => {
                clickedBtn.classList.remove('syncing');
                clickedBtn.classList.add('active');
                document.getElementById('statusMsg').innerText = `✅ ${name} 已改為【${newVal}】`;
                
                // 同步更新記憶體中的資料
                const headers = rawData[0];
                const colIndex = headers.indexOf(eventName);
                for(let i = 1; i < rawData.length; i++){
                    if(rawData[i][1] === name) { rawData[i][colIndex] = newVal; break; }
                }
            }, 300); // 按鈕反應加快到 300 毫秒
        } catch (e) {
            alert('更新失敗，請檢查網路');
            render();
        }
    }

    init();
</script>

</body>
</html>
